<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thực hành Thoát nạn - THPT Trần Suyền</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background: #f0f4f8; margin: 0; }
        .header { background: #003366; color: white; padding: 15px; border-bottom: 5px solid #ff9800; }
        .map-box { position: relative; width: 95%; max-width: 900px; margin: 15px auto; background: white; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; }
        img { width: 100%; display: none; pointer-events: none; }
        img.active { display: block; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; cursor: crosshair; touch-action: none; }
        .controls { margin: 15px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        button { padding: 10px 15px; cursor: pointer; border-radius: 20px; border: 1px solid #003366; font-weight: bold; background: white; }
        button.active { background: #003366; color: white; }
        .btn-check { background: #28a745; color: white; border: none; }
        .btn-clear { background: #dc3545; color: white; border: none; }
        #result-msg { margin: 20px; padding: 15px; border-radius: 10px; display: none; font-size: 1.2em; font-weight: bold; transition: 0.5s; }
        .success { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; display: block !important; }
        .fail { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; display: block !important; }
    </style>
</head>
<body>

<div class="header">
    <h2>BÀI TẬP: TÌM ĐƯỜNG ĐẾN ĐIỂM THOÁT NẠN AN TOÀN</h2>
    <p>Điểm đến: Chùa Hương Sơn hoặc Trạm y tế xã Hòa Kiến</p>
</div>

<div class="controls">
    <button onclick="setMap('gt', this)" class="active">Giao thông</button>
    <button onclick="setMap('dh', this)">Địa hình (Gợi ý)</button>
    <button onclick="setMap('c3', this)">Báo động 3</button>
    <button class="btn-clear" onclick="clearCanvas()">🧹 Xóa vẽ</button>
    <button class="btn-check" onclick="checkLogic()">✅ KIỂM TRA KẾT QUẢ</button>
</div>

<div class="map-box" id="container">
    <img src="GTHONG.png" id="gt" class="active">
    <img src="DEM2.png" id="dh">
    <img src="BDC1.png" id="c1">
    <img src="BDC2.png" id="c2">
    <img src="BDC3.png" id="c3">
    <canvas id="canvas"></canvas>
</div>

<div id="result-msg"></div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('container');
    let drawing = false;
    let endX, endY;

    function resize() {
        const activeImg = document.querySelector('img.active');
        canvas.width = container.offsetWidth;
        canvas.height = activeImg.offsetHeight;
    }
    window.onload = () => setTimeout(resize, 500);
    window.onresize = resize;

    function setMap(id, btn) {
        document.querySelectorAll('img').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        resize();
    }

    canvas.addEventListener('mousedown', () => { drawing = true; ctx.beginPath(); });
    canvas.addEventListener('mousemove', (e) => {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;
        ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = 'red';
        ctx.lineTo(x, y); ctx.stroke();
        endX = x; endY = y;
    });
    canvas.addEventListener('mouseup', () => drawing = false);
