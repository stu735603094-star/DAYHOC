<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thực hành Thoát nạn - THPT Trần Suyền</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f4f8; margin: 0; }
        .header { background: #003366; color: white; padding: 15px; border-bottom: 5px solid #ff9800; }
        .map-box { position: relative; width: 95%; max-width: 900px; margin: 15px auto; background: white; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; }
        
        /* Chồng tất cả ảnh lên nhau */
        .map-layers img { width: 100%; display: none; pointer-events: none; }
        .map-layers img.active { display: block; }
        
        /* Canvas vẽ phải luôn nằm trên cùng */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: crosshair; touch-action: none; }
        
        .controls { margin: 15px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        button { padding: 10px 15px; cursor: pointer; border-radius: 20px; border: 1px solid #003366; font-weight: bold; background: white; z-index: 20; position: relative; }
        button.active { background: #003366; color: white; }
        .btn-check { background: #28a745; color: white; border: none; }
        .btn-clear { background: #dc3545; color: white; border: none; }
        #result-msg { margin: 20px; padding: 15px; border-radius: 10px; display: none; font-size: 1.1em; font-weight: bold; }
        .success { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; display: block !important; }
        .fail { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; display: block !important; }
    </style>
</head>
<body>

<div class="header">
    <h2>BÀI TẬP: THIẾT KẾ ĐƯỜNG THOÁT LŨ</h2>
    <p>Địa điểm an toàn: Chùa Hương Sơn hoặc Trạm y tế xã Hòa Kiến</p>
</div>

<div class="controls">
    <button onclick="setLayer('gt', this)" class="active">Giao thông</button>
    <button onclick="setLayer('dh', this)">Địa hình</button>
    <button onclick="setLayer('c1', this)">Báo động 1</button>
    <button onclick="setLayer('c2', this)">Báo động 2</button>
    <button onclick="setLayer('c3', this)">Báo động 3</button>
    <button class="btn-clear" onclick="clearCanvas()">🧹 Xóa vẽ</button>
    <button class="btn-check" onclick="checkResult()">✅ KIỂM TRA KẾT QUẢ</button>
</div>

<div class="map-box" id="container">
    <div class="map-layers">
        <img src="GTHONG.png" id="img-gt" class="active">
        <img src="DEM2.png" id="img-dh">
        <img src="BDC1.png" id="img-c1">
        <img src="BDC2.png" id="img-c2">
        <img src="BDC3.png" id="img-c3">
    </div>
    <canvas id="canvas"></canvas>
</div>

<div id="result-msg"></div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('container');
    let drawing = false;
    let endX, endY;

    // Thiết lập kích thước canvas chuẩn theo ảnh
    function resize() {
        const activeImg = document.querySelector('.map-layers img.active');
        canvas.width = container.offsetWidth;
        canvas.height = activeImg.offsetHeight;
    }
    
    // Tải trang xong thì resize
    window.onload = () => setTimeout(resize, 500);

    // Chuyển lớp ảnh (Giữ nguyên nét vẽ trên canvas)
    function setLayer(id, btn) {
        document.querySelectorAll('.map-layers img').forEach(img => img.classList.remove('active'));
        document.getElementById('img-' + id).classList.add('active');
        
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Cập nhật lại chiều cao canvas nếu ảnh khác nhau
        const currentData = ctx.getImageData(0,0, canvas.width, canvas.height);
        resize();
        ctx.putImageData(currentData, 0, 0); 
    }

    // Xử lý vẽ
    canvas.onmousedown = (e) => { drawing = true; ctx.beginPath(); };
    canvas.onmousemove = (e) => {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        ctx.lineWidth = 3; ctx.strokeStyle = 'red'; ctx.lineCap = 'round';
        ctx.lineTo(x, y); ctx.stroke();
        endX = x; endY = y;
    };
    canvas.onmouseup = () => drawing = false;

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById('result-msg').style.display = 'none';
        endX = null;
    }

    function checkResult() {
        const msg = document.getElementById('result-msg');
        if (!endX) { alert("Học sinh cần vẽ đường đi trước!"); return; }

        const pX = endX / canvas.width;
        const pY = endY / canvas.height;

        // Tọa độ VÙNG AN TOÀN (Bạn có thể tinh chỉnh số này sau khi test)
        // Chùa Hương Sơn (Ví dụ: khu vực phía trên bên trái)
        const isChuaHS = (pX > 0.35 && pX < 0.45 && pY > 0.3 && pY < 0.45);
        // Trạm y tế (Ví dụ: khu vực phía dưới bên trái)
        const isTramYT = (pX > 0.1 && pX < 0.2 && pY > 0.7 && pY < 0.85);

        if (isChuaHS || isTramYT) {
            let dich = isChuaHS ? "Chùa Hương Sơn" : "Trạm y tế xã Hòa Kiến";
            msg.innerHTML = "✅ XUẤT SẮC! Em đã tìm được đường thoát nạn an toàn đến " + dich;
            msg.className = "success";
        } else {
            msg.innerHTML = "❌ CHƯA ĐÚNG: Điểm dừng của em vẫn nằm trong vùng nguy hiểm hoặc chưa đến đúng trạm cứu hộ.";
            msg.className = "fail";
        }
        msg.style.display = "block";
    }
</script>

</body>
</html>
